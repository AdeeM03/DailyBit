name: dailybit
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State Management
  provider: ^6.1.2 
  # Database (Isar Plus - enhanced fork with web support)
  isar_plus: ^1.2.5
  isar_plus_flutter_libs: ^1.2.5
  path_provider: ^2.1.5
  # Keep SharedPreferences for data migration only
  shared_preferences: ^2.2.3
  # Format Tanggal (Krusial untuk sistem Streak)
  intl: ^0.20.2
  # UI & Font
  google_fonts: ^6.2.1
  # Haptic Feedback
  vibration: ^1.8.3
  # Local Notifications (mobile)
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  chiclet: ^1.2.1
  font_awesome_flutter: ^11.0.0
  flutter_animate: ^4.5.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1
  flutter_native_splash: ^2.4.7
  cupertino_calendar_picker: ^2.2.6
  persistent_bottom_nav_bar: ^6.2.1
  flex_color_scheme: ^8.0.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.0.0
  image_picker: ^1.2.2
  cherry_toast: ^1.13.0
  circular_countdown_timer: ^0.2.4
  introduction_screen: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/onboarding-ilust/
