name: dailybit
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.1.2 
  # Database (Isar Plus - enhanced fork with web support)
  isar_plus: ^1.2.5
  isar_plus_flutter_libs: ^1.2.5
  path_provider: ^2.1.5
  # Keep SharedPreferences for data migration only
  shared_preferences: ^2.2.3
  # Format Tanggal (Krusial untuk sistem Streak)
  intl: ^0.19.0
  # UI & Font
  google_fonts: ^6.2.1
  # Haptic Feedback
  vibration: ^1.8.3
  # Local Notifications (mobile)
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  chiclet: ^1.2.1
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
